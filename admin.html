<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Admin Panel | HI-NOVA APEX LLP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#1591DC">
  <link href="67512b0c631970a86b689dc8/hinova-favicon.png" rel="shortcut icon" type="image/x-icon">
  <link href="67512b0c631970a86b689dc8/676ba2d1a7c0ee9345d125e9_favicon.png" rel="apple-touch-icon">
  <link href="css/admin.css" rel="stylesheet">
  <!-- Quill.js Rich Text Editor -->
  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
  <!-- Admin Bearer token (set this to match `wrangler secret put ADMIN_TOKEN`) -->
  <meta name="admin-token" content="">
</head>
<body>
  <a class="skip-link" href="#admin-content">Skip to main content</a>

  <!-- LOGIN VIEW -->
  <div id="login-view" class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <img src="logo/hinova-logo.png" alt="HI-NOVA APEX LLP">
      </div>
      <h1>Admin Login</h1>
      <p class="login-subtitle">HI-NOVA APEX LLP &mdash; restricted access</p>
      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="login-email">Email</label>
          <input type="email" id="login-email" class="form-input" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input type="password" id="login-password" class="form-input" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:24px">Sign In</button>
        <div id="login-error" class="login-error"></div>
      </form>
    </div>
  </div>

  <!-- APP VIEW -->
  <div id="app-view" style="display:none">
    <!-- Sidebar Overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Sidebar -->
    <aside class="admin-sidebar" id="admin-sidebar" aria-label="Primary navigation">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <a href="index.html" target="_blank" title="HI-NOVA APEX LLP">
            <img src="logo/hinova-logo.png" alt="HI-NOVA APEX LLP">
          </a>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-title">Main</div>
          <div class="nav-item active" role="button" tabindex="0" aria-current="page" data-page="dashboard">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7"></rect>
              <rect x="14" y="3" width="7" height="7"></rect>
              <rect x="14" y="14" width="7" height="7"></rect>
              <rect x="3" y="14" width="7" height="7"></rect>
            </svg>
            Dashboard
          </div>
          <div class="nav-item" role="button" tabindex="0" data-page="posts">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
              <polyline points="14 2 14 8 20 8"></polyline>
              <line x1="16" y1="13" x2="8" y2="13"></line>
              <line x1="16" y1="17" x2="8" y2="17"></line>
              <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
            Posts
            <span class="nav-badge" id="posts-count" style="display:none">0</span>
          </div>
          <div class="nav-item" role="button" tabindex="0" data-page="create-post">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            New Post
          </div>
        </div>

        <div class="nav-section">
          <div class="nav-section-title">Content</div>
          <div class="nav-item" role="button" tabindex="0" data-page="categories">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
            </svg>
            Categories
          </div>
          <div class="nav-item" role="button" tabindex="0" data-page="cms-services">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>
            Services
          </div>
          <div class="nav-item" role="button" tabindex="0" data-page="cms-projects">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
            Projects
          </div>
          <div class="nav-item" role="button" tabindex="0" data-page="cms-testimonials">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            Testimonials
          </div>
          <div class="nav-item" role="button" tabindex="0" data-page="cms-industries">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 20h20"></path><path d="M5 20V8l7-4 7 4v12"></path><path d="M9 20v-6h6v6"></path></svg>
            Industries
          </div>
        </div>
        <div class="nav-section">
          <div class="nav-section-title">Team</div>
          <div class="nav-item" role="button" tabindex="0" data-page="cms-team_members">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
            Team Members
          </div>
        </div>

        <div class="nav-section">
          <div class="nav-section-title">Communication</div>
          <div class="nav-item" role="button" tabindex="0" data-page="messages">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
              <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
            Messages
            <span class="nav-badge" id="messages-count" style="display:none">0</span>
          </div>
          <div class="nav-item" role="button" tabindex="0" data-page="newsletter">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
              <rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect>
              <rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect>
              <line x1="6" y1="6" x2="6.01" y2="6"></line>
              <line x1="6" y1="18" x2="6.01" y2="18"></line>
            </svg>
            Newsletter
          </div>
        </div>
      </nav>

      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="user-avatar">A</div>
          <div class="user-details">
            <div class="user-name" id="user-name">Admin</div>
            <div class="user-email" id="user-email"></div>
          </div>
        </div>
        <button class="btn btn-secondary btn-sm" id="logout-btn" style="width:100%">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
          Log out
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <div class="admin-main">
      <!-- Topbar -->
      <header class="admin-topbar">
        <div class="topbar-left">
          <button class="menu-toggle" id="menu-toggle" aria-label="Toggle menu" aria-expanded="false" aria-controls="admin-sidebar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="3" y1="12" x2="21" y2="12"></line>
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
          </button>
          <span class="page-title" id="page-title">Dashboard</span>
        </div>
        <div class="topbar-right">
          <a href="index.html" target="_blank" class="btn-view-site">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
              <polyline points="15 3 21 3 21 9"></polyline>
              <line x1="10" y1="14" x2="21" y2="3"></line>
            </svg>
            View Site
          </a>
        </div>
      </header>

      <!-- Content Area -->
      <main class="admin-content" id="admin-content">
        <!-- Pages rendered dynamically by JS -->
      </main>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Modal Container -->
  <div id="modal-container"></div>

  <!-- Quill.js -->
  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>

  <!-- Admin JS -->
  <script type="module" src="js/admin.js"></script>
  <!-- Phase E CMS extension (team_members, services, projects, testimonials) -->
  <script type="module" src="js/admin-cms.js"></script>
  <!-- Seed script: load via admin.html?seed=1 to populate Firestore with frontend data -->
  <script type="module" src="js/seed-cms.js"></script>
</body>
</html>
